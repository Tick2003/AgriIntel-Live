name: Daily Market Data Update

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC daily
  workflow_dispatch: # Allows manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install -q -q --upgrade pip
        pip install -q -q -r requirements.txt
        
    - name: Run Data Loader
      run: |
        python etl/data_loader.py
        
    - name: Commit and Push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        mkdir -p data
        git add -f data/market_prices.csv
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Auto-update market prices [skip ci]"
          git pull --rebase
          git push "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
        fi

